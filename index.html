<!DOCTYPE html>
<html>
    <head>
        <title>Zero Bots Allowed</title>
        <link rel="icon" type="image/x-icon" href="icon.png">
        <style>
          body {
              text-align:center;
              background:#408000;
              color:#80ff00;
              font-size:25px;
              padding:10px;
          }
          
          .tostyle {
              background:#408000;
              color:#80ff00;
              border:none;
              font-size:20px;
              border-radius:10px;
              padding:10px;
              border:solid 3px #80ff00;
              transition:.5s;
          }
          
          .tostyle:hover{
              background:#80ff00;
              color:#408000;
          }
          
          button {
              cursor:pointer;
          }
          
          p {
              font-size:20px;
          }
          
          @keyframes flash {
              from { border-color:red;
                     color:red; }
              to {}
          }
        </style>
    </head>
    <body>
        <div style="margin-top:35vh;">
            <h1 style="margin-bottom:20px;">Zero Bot Gate</h1>
                <input type="password" placeholder="Enter Your Passphrase" name="in" required id="in" class="tostyle"/>
                <span type="submit" onclick="test()" class="tostyle" style="margin-left:20px;width:25px;text-align:center;margin-bottom:30px;display:inline-block;cursor:pointer;">></span>
            <div></div>
            <button class="tostyle" href="help.html">Need a new passphrase?</button>
            <p>By entering a passphrase and proceeding, you agree to our ToS.</p>
        </div>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/3.1.9-1/crypto-js.js"></script>
        <script>
            
            
            const data = [
                "password",
                "thisisatest",
                "0zv0ja7ZCbBF3EdC0a+lYH/sHXXrceh3uNKC9VW/SIM=" // 'this is a test'
                ]
            
            function hash( pass ) {
                var hash = CryptoJS.SHA256( pass + "noAI" );
                hash = hash.toString(CryptoJS.enc.Base64);
                console.log("    hashed " + pass + " into " + hash );
                return hash;
            }
            
            function check( pass ) {
                
                for (const stored of data) {
                    const match = ( pass === stored );
                    console.log("    checking " + pass + " against " + stored);
                    console.log("    > returned " + match);
                    if (match) return true;
                }
                return false;
            }
            
            async function test() {
                console.log("STARTING");
                const input = await document.getElementById("in");
                const pass = input.value;
                console.log("password: " + pass);
                console.log("hashed: " + hash(pass) );
                console.log("checkign against data");
                if ( check( hash(pass) ) ) {
                    console.log("APROVED");
                } else {
                    console.log("DENIED");
                }
            }

                
        </script>
    </body>
</html>
