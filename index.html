<html>
    <head>
        <title>Zero Bots Allowed</title>
        <link rel="icon" type="image/x-icon" href="icon.png">
        <style>
          body {
              text-align:center;
              background:#408000;
              color:#80ff00;
              font-size:25px;
              padding:10px;
          }
          
          .tostyle {
              background:#408000;
              color:#80ff00;
              border:none;
              font-size:20px;
              border-radius:10px;
              padding:10px;
              border:solid 3px #80ff00;
              transition:.5s;
          }
          
          .tostyle:hover{
              background:#80ff00;
              color:#408000;
          }
          
          button {
              cursor:pointer;
          }
          
          p {
              font-size:20px;
          }
          
          @keyframes flash {
              from { border-color:red;
                     color:red; }
              to {}
          }
        </style>
    </head>
    
    <script>
        const bcrypt = require('bcrypt');
        
        const data = [
            "password"
            ]
        
        async function hash( pass ) {
            return await bcrypt.hash(pass + "noAI", 8);
        }
        
        async function check( pass ) {
            for (const stored of data) {
              const match = await bcrypt.compare(pass, stored);
              if (match) return true;
            }
            return false
        }
        
        async function test() {
            print("starting");
            const input = await document.getElementById("in");
            const pass = input.innerHTML;
            print("password: " + pass);
            print("hashed: " + hash(pass);
            if ( check(pass) ) {
                print("APROVED");
            } else {
                print("DENIED");
            }
        }
    </script>

    
    <body>
        <div style="margin-top:35vh;">
            <h1 style="margin-bottom:20px;">Zero Bot Gate</h1>
                <input type="password" placeholder="Enter Your Passphrase" name="in" required id="in" class="tostyle"/>
                <button type="submit" onsubmit="test()" class="tostyle" style="margin-left:20px;width:50px;text-align:center;margin-bottom:30px;">></button>
            <div></div>
            <button class="tostyle" href="help.html">Need a new passphrase?</button>
            <p>By entering a passphrase and proceeding, you agree to our ToS.</p>
        </div>
    </body>
</html>
